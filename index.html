<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->

    <title>Assignment-4</title>
  </head>
  <body class="bg-[#f0f1f2]">
    <header>
      <section class="w-10/12 mx-auto pt-14">
        <h1 class="text-4xl font-bold">Job Application Tracker</h1>
        <div class="dashboard-cards md:flex justify-between py-6">
          <div class="bg-[#FFFFFF] w-[350px] p-5 rounded-lg">
            <p class="font-medium text-gray-700 mb-2">Total</p>
            <p class="text-3xl font-semibold">8</p>
          </div>
          <div class="bg-[#FFFFFF] w-[350px] p-5 rounded-lg">
            <p class="font-medium text-gray-700 mb-2">Interview</p>
            <p class="text-3xl font-semibold text-green-500">0</p>
          </div>
          <div class="bg-[#FFFFFF] w-[350px] p-5 rounded-lg">
            <p class="font-medium text-gray-700 mb-2">Rejected</p>
            <p class="text-3xl font-semibold text-red-500">0</p>
          </div>
        </div>
      </section>
    </header>

    <section class="jobs-card hidden">
      <h1>Available Jobs</h1>
    </section>
  </body>
</html>
