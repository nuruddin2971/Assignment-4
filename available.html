<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->

    <title>Assignment-4</title>
  </head>
  <body class="bg-[#F8FAFC] py-14">
    <header>
      <section class="w-10/12 mx-auto">
        <h1 class="text-4xl font-bold">Job Application Tracker</h1>
        <div class="dashboard-cards md:flex justify-between py-6">
          <div class="bg-[#FFFFFF] w-[350px] p-5 rounded-lg mb-4">
            <p class="font-medium text-gray-700 mb-2">Total</p>
            <p class="text-3xl font-semibold">8</p>
          </div>
          <div class="bg-[#FFFFFF] w-[350px] p-5 rounded-lg mb-4">
            <p class="font-medium text-gray-700 mb-2">Interview</p>
            <p class="text-3xl font-semibold text-green-500">0</p>
          </div>
          <div class="bg-[#FFFFFF] w-[350px] p-5 rounded-lg mb-4">
            <p class="font-medium text-gray-700 mb-2">Rejected</p>
            <p class="text-3xl font-semibold text-red-500">0</p>
          </div>
        </div>
      </section>
    </header>
    <section class="w-10/12 mx-auto pt-7 space-y-5">
      <div class="flex justify-between pb-6">
        <h1 class="text-2xl font-semibold">Available Jobs</h1>
        <p class="text-gray-500">0 jobs</p>
      </div>
      <div class="">
        <button class="btn btn-soft w-24 bg-[#FFFFFF]">All</button>
        <button class="btn btn-soft bg-[#FFFFFF]">Interview</button>
        <button class="btn btn-soft bg-[#FFFFFF]">Rejected</button>
      </div>
      <div class="bg-[#FFFFFF] rounded-lg text-center h-[400px]">
        <div class="flex justify-center">
          <img src="./assets/jobs.png" alt="" />
        </div>
        <h1 class="text-xl font-semibold">No jobs available</h1>
        <p class="text-gray-500">Check back soon for new job opportunities</p>
      </div>
    </section>
  </body>
</html>
